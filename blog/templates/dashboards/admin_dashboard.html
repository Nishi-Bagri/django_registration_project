{% extends "dashboards/dashboard_base.html" %}

{% block dashboard_content %}

<h2 style="text-align: center;">Admin Dashboard</h2>

<div class="dashboard-grid">

    <div class="dashboard-card">
        <h3>Total Blogs</h3>
        <p>{{ total_blogs }}</p>
    </div>

    <div class="dashboard-card">
        <h3>Pending Blogs</h3>
        <p>{{ pending_blogs }}</p>
    </div>

    <div class="dashboard-card">
        <h3>Approved Blogs</h3>
        <p>{{ approved_blogs }}</p>
    </div>

    <div class="dashboard-card">
        <h3>Rejected Blogs</h3>
        <p>{{ rejected_blogs }}</p>
    </div>

</div>

{% endblock %}
