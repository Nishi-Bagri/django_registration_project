{% extends "dashboards/dashboard_base.html" %}

{% block dashboard_content %}

<h1 class="admin-title">All Users</h1>

<div class="table-container">

    <table class="admin-table">
        <thead>
            <tr>
                <th>Name</th>
                <th>Email</th>
                <th>Role</th>
            </tr>
        </thead>

        <tbody>
            {% for user in users %}
            <tr>
                <td>{{ user.name }}</td>
                <td>{{ user.email }}</td>
                <td>{{ user.role }}</td>
            </tr>
            {% endfor %}
        </tbody>

    </table>

</div>

{% endblock %}
