<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Edit Profile</title>
    {% load static %}
    <link rel="stylesheet" href="{% static 'css/style.css' %}" />
  </head>
  <body>
    <div class="container">
      <h2>Edit Profile</h2>
      <form method="POST" enctype="multipart/form-data">
        {% csrf_token %}

        <label>Name:</label>
        <input type="text" name="name" value="{{ user.name }}" /><br /><br />

        <label>Phone:</label>
        <input type="text" name="phone" value="{{ user.phone }}" /><br /><br />

        <label>Age:</label>
        <input type="text" name="age" value="{{ user.age }}" /><br /><br />

        <label>Address:</label>
        <textarea name="address">{{ user.address }}</textarea><br /><br />

        <label>Profile Picture</label><br />

        {% if user.profile_pic %}
        <img src="{{ user.profile_pic.url }}" width="100" /><br /><br />
        {% endif %}

        <input type="file" name="profile_pic" /><br /><br />

        <button type="submit">Save Changes</button>
      </form>

      <a href="{% url 'change_password' %}">Change Password</a>
    </div>
  </body>
</html>
