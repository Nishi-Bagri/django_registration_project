{% extends 'dashboards/dashboard_base.html' %}

{% block dashboard_content %}

<h1>All Users</h1>

{% for user in users %}
    <div>
        <p><strong>Name:</strong>{{ user.name}}</p>
        <p><strong>Email:</strong>{{ user.email}}</p>
        <p><strong>Role:</strong>{{ user.role}}</p>
    </div>

    <hr>
{% endfor %}

{% endblock %}
