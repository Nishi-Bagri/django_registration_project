<body>
    <h2>Change Password</h2>

<form method="POST">
    {% csrf_token %}
    
    <label>Old Password:</label>
    {{ form.old_password }}

    <br><br>

    <label>New Password:</label>
    {{ form.new_password1 }}

    <br><br>

    <label>Confirm New Password:</label>
    {{ form.new_password2 }}

    <br><br>

    <button type="submit">Update Password</button>
</form>
